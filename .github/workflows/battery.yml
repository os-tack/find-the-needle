name: Battery — Full Benchmark Suite

on:
  workflow_dispatch:
    inputs:
      models:
        description: "Comma-separated model list (OpenRouter names)"
        required: false
        default: >-
          anthropic/claude-sonnet-4-6,anthropic/claude-opus-4-6,anthropic/claude-sonnet-4-5,anthropic/claude-haiku-4.5,
          deepseek/deepseek-v3.2,deepseek/deepseek-chat,deepseek/deepseek-r1,
          mistralai/mistral-large,mistralai/devstral-medium,mistralai/codestral-2508,
          google/gemini-2.0-flash-001,google/gemini-2.5-flash,google/gemini-2.5-pro,google/gemini-3-flash-preview,google/gemini-3.1-pro-preview,
          openai/gpt-4o,openai/gpt-4.1,
          x-ai/grok-4-fast,x-ai/grok-4.1-fast,
          meta-llama/llama-4-maverick,meta-llama/llama-3.3-70b-instruct,
          qwen/qwen-plus,qwen/qwen3-coder-plus,qwen/qwen3-coder-flash,qwen/qwen3.5-flash-02-23,qwen/qwen3.5-plus-02-15
      benchmarks:
        description: "Comma-separated benchmark list or 'all'"
        required: false
        default: "all"
      tier:
        description: "Difficulty tier filter"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - easy
          - medium
          - hard
      version:
        description: "Release version tag (e.g. v2.0.0, v2.1.0)"
        required: false
        default: ""
  schedule:
    - cron: "0 0 * * 0" # Sundays at 00:00 UTC

concurrency:
  group: battery
  cancel-in-progress: false

jobs:
  # ---------- Phase 1: Build the dynamic matrix from difficulty.json ----------
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build matrix JSON
        id: matrix
        env:
          MODELS_INPUT: ${{ github.event.inputs.models || 'anthropic/claude-sonnet-4-6,anthropic/claude-opus-4-6,anthropic/claude-sonnet-4-5,anthropic/claude-haiku-4.5,deepseek/deepseek-v3.2,deepseek/deepseek-chat,deepseek/deepseek-r1,mistralai/mistral-large,mistralai/devstral-medium,mistralai/codestral-2508,google/gemini-2.0-flash-001,google/gemini-2.5-flash,google/gemini-2.5-pro,google/gemini-3-flash-preview,google/gemini-3.1-pro-preview,openai/gpt-4o,openai/gpt-4.1,x-ai/grok-4-fast,x-ai/grok-4.1-fast,meta-llama/llama-4-maverick,meta-llama/llama-3.3-70b-instruct,qwen/qwen-plus,qwen/qwen3-coder-plus,qwen/qwen3-coder-flash,qwen/qwen3.5-flash-02-23,qwen/qwen3.5-plus-02-15' }}
          BENCHMARKS_INPUT: ${{ github.event.inputs.benchmarks || 'all' }}
          TIER_INPUT: ${{ github.event.inputs.tier || 'all' }}
        run: |
          python3 << 'PYEOF' > matrix.json
          import json, os, sys

          with open("difficulty.json") as f:
              diff = json.load(f)

          tiers = diff["tiers"]
          benchmarks_map = diff["benchmarks"]

          models = [m.strip() for m in os.environ["MODELS_INPUT"].split(",") if m.strip()]
          bench_input = os.environ["BENCHMARKS_INPUT"].strip()
          tier_input = os.environ["TIER_INPUT"].strip()

          if bench_input == "all":
              bench_list = list(benchmarks_map.keys())
          else:
              bench_list = [b.strip() for b in bench_input.split(",") if b.strip()]

          # Filter by tier
          if tier_input != "all":
              bench_list = [b for b in bench_list if benchmarks_map.get(b) == tier_input]

          # Build matrix: one entry per model (all benchmarks run sequentially per model).
          # GitHub Actions caps at 256 jobs per matrix. Each job runs all benchmarks
          # for one model, both arms. This keeps the matrix small (= number of models).
          matrix = []
          for model in models:
              # Use the hardest tier's wall clock for timeout
              max_wall = max(t.get("wall_clock", 600) for t in tiers.values())
              # Each model runs all benchmarks × 2 arms sequentially
              timeout = max(30, (max_wall * len(bench_list) * 2) // 60 + 10)
              # Cap at 6 hours
              timeout = min(timeout, 360)
              matrix.append({
                  "model": model,
                  "artifact_name": model.replace("/", "-"),
                  "timeout": timeout,
              })

          print(f"Generated {len(matrix)} matrix entries ({len(models)} models x {len(bench_list)} benchmarks)", file=sys.stderr)
          if not matrix:
              print("WARNING: empty matrix -- no matching benchmarks", file=sys.stderr)

          print(json.dumps(matrix))
          PYEOF

          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"
          echo "Matrix size: $(python3 -c "import json; print(len(json.load(open('matrix.json'))))")"

  # ---------- Phase 2: Run each (model x benchmark) in parallel ----------
  bench:
    needs: setup
    if: needs.setup.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.combo.timeout }}

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        combo: ${{ fromJSON(needs.setup.outputs.matrix) }}

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Migration: ostk bench will replace runner.py once the kernel supports
      # Docker execution natively. See docs/OSTK_BENCH_SPEC.md for the plan.
      # When ostk is available as a pre-built binary, uncomment the install step
      # and the bench job will automatically prefer it over runner.py.
      - name: Install ostk
        id: install-ostk
        run: |
          # TODO: Replace with actual release URL when ostk is published
          # curl -sSL https://ostk.ai/install | bash
          # For now, fall back to runner.py
          echo "ostk not yet available as pre-built binary — using runner.py fallback"
        continue-on-error: true

      - name: Run all benchmarks with ${{ matrix.combo.model }}
        run: |
          MODEL="${{ matrix.combo.model }}"

          echo "Running all benchmarks for $MODEL (bare + silent arms)"

          python3 run_arms.py \
            --model "$MODEL" \
            --provider openrouter \
            --all-benchmarks \
            2>&1 | tee bench-output.log || true

          echo "Score files produced:"
          find runs/ -name '*.score.json' | wc -l

      - name: Upload score artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: score--${{ matrix.combo.artifact_name }}
          path: |
            runs/*/
          retention-days: 90

  # ---------- Phase 3: Consolidate scores, build site, deploy ----------
  consolidate:
    needs: [setup, bench]
    if: always() && needs.setup.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download all score artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifact-scores
          pattern: score--*

      - name: Merge artifacts into runs/
        run: |
          # Each artifact is in artifact-scores/score--<model>--<benchmark>/runs/<model>/...
          # Copy them into the repo's runs/ directory
          find artifact-scores -name '*.score.json' -o -name 'score.json' -o -name 'post.jsonl' -o -name 'metrics.jsonl' | while read f; do
            # Extract the path relative to runs/
            REL=$(echo "$f" | sed 's|.*runs/||')
            DIR=$(dirname "runs/$REL")
            mkdir -p "$DIR"
            cp "$f" "runs/$REL"
          done

          echo "Merged score files:"
          find runs -name '*.score.json' | wc -l

      - name: Consolidate scores
        run: |
          python3 consolidate_scores.py
          echo "---"
          cat public/scores.json | python3 -m json.tool | head -50

      - name: Run POST battery
        run: |
          python3 run_post.py --all || echo "POST battery had errors (non-fatal)"

      - name: Commit updated scores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage everything first, then pull --rebase (avoids unstaged changes error)
          git add public/scores.json public/experiment-scores.json public/haystack-boot-leaderboard.json 2>/dev/null || true
          git add runs/ 2>/dev/null || true

          VERSION="${{ github.event.inputs.version }}"
          TAG_MSG=""
          if [ -n "$VERSION" ]; then
            TAG_MSG=" ($VERSION)"
          fi

          if git diff --cached --quiet; then
            echo "No score changes to commit"
          else
            git commit -m "chore: update scores from battery run${TAG_MSG} [skip ci]"
            # Pull remote changes, rebase our commit on top, then push
            git pull --rebase origin main || true
            git push || {
              echo "Push failed — force pushing score update"
              git push --force-with-lease
            }
          fi

          # Tag the release if version was specified
          if [ -n "$VERSION" ]; then
            git tag -a "$VERSION" -m "needle-bench $VERSION — battery results"
            git push origin "$VERSION"
            echo "Tagged $VERSION"
          fi

      - name: Build Astro site
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deploy
        uses: actions/deploy-pages@v4
